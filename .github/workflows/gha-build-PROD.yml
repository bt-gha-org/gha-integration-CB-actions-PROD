name: GHA Build

on:
    push:
     branches:
      - main
    workflow_dispatch:
env:
    artifact_version: 4.0.0
permissions:
    id-token: write
    contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifactId: ${{ steps.artifact-id.outputs.test }}
    steps:
      - name: Compile Code
        run: echo "Compiling..."

      - name: Produce Binary
        run: sleep 5

      - name: Push binary
        run: echo "Pushing Binary to ECR..."

      - name: Register Build Artifacts in Cloudbees Platform
        uses: cloudbees-io-gha/register-build-artifact@v3
        id: go-action
        with:
          name: "Automation test for Register-Artifacts"
          version: ${{ env.artifact_version }}
          url: docker.io/SampleApp/SampleApp-Backend-15:${{ env.artifact_version }}
          type: "docker"
          cloudbees-url: "https://api.cloudbees.io"
          cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}

      - name: Publish evidence
        uses: cloudbees-io-gha/publish-evidence-item@v2
        with:
          cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}
          cloudbees-url: "https://api.cloudbees.io"
          content: |-
            Build Completed and artifacts published to Cloudbees platform

      - name: Set the artifact-id
        id: artifact-id
        run: |
            echo ${{ steps.go-action.outputs.cbp_artifact_id }}
            echo "test=${{ steps.go-action.outputs.cbp_artifact_id }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: [build]   # Depends on 'build' job
    steps:
      - name: Run tests
        run: echo "Running Tests..."

      - name: Checkout to Collect Test Results
        uses: actions/checkout@v3

      - name: Publish Test Results in Cloudbees Plaform
        uses: cloudbees-io-gha/publish-test-results@v2
        with:
          test-type: GO
          results-path: test-results/results.json
          cloudbees-url: "https://api.cloudbees.io"
          # cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}

      - name: Publish evidence
        uses: cloudbees-io-gha/publish-evidence-item@v2
        with:
          cloudbees-url: "https://api.cloudbees.io"
          # cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}
          content: |-
            Testing Completed and results published to Cloudbees platform
            Test | Results |
            --------|---------|
            Test 1 | PASS |
            Test 2 | FAIL |
            Test 3 | PASS |


  deploy:
    runs-on: ubuntu-latest
    needs: [build,test]   # Depends on both 'build' and 'test' jobs
    steps:
      - name: Checkout to Prepare Manifest
        uses: actions/checkout@v3

      - name: Register Deployed Artifact in CloudBees Platform
        uses: cloudbees-io-gha/register-deployed-artifact@v1
        with:
          artifact-id: ${{ needs.build.outputs.artifactId }}
          target-environment: "production"
          cloudbees-url: "https://api.cloudbees.io"

      - name: Trigger Deployment
        uses: cloudbees-io-gha/run-cloudbees-workflow@v1
        id: deploy
        with :
          cloudbees-url: "https://api.cloudbees.io"
          cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}
          branch-name: "main"
          workflow-file-name: "cbp-deploy.yaml"
          workflow-inputs: '{"artifactName": "SampleApp-Backend-15","artifactVersion": "${{ env.artifact_version }}", "environment": "PROD", "artifactId" : "${{needs.build.outputs.artifactId}}"}'

      - name: Use runUrl output
        run: echo "The CloudBees run URL is ${{ steps.deploy.outputs.cbp_run_url }}"

  build-2:
    runs-on: ubuntu-latest
    needs: [deploy]   # Depends on first deploy job
    outputs:
      artifactId2: ${{ steps.artifact-id-2.outputs.test }}
    steps:
      - name: Compile Code - Second Build
        run: echo "Compiling second artifact..."

      - name: Produce Binary - Second Build
        run: sleep 5

      - name: Register Build Artifacts in CloudBees Platform - Second Build
        uses: cloudbees-io-gha/register-build-artifact@v3
        id: go-action-2
        with:
          name: "Automation test for Register-Artifacts-2"
          version: "2.0.0"
          url: docker.io/SampleApp/SampleApp-Backend-16:2.0.0
          type: "docker"
          cloudbees-url: "https://api.cloudbees.io"
          cloudbees-pat: ${{ secrets.BT_USER_PAT_GHA_PROD }}

      - name: Set the artifact-id for second build
        id: artifact-id-2
        run: |
            echo ${{ steps.go-action-2.outputs.cbp_artifact_id }}
            echo "test=${{ steps.go-action-2.outputs.cbp_artifact_id }}" >> $GITHUB_OUTPUT

  test-2:
    runs-on: ubuntu-latest
    needs: [build-2]
    steps:
      - name: Run tests - Second Build
        run: echo "Running Tests for second build..."

  deploy-2:
    runs-on: ubuntu-latest
    needs: [build-2, test-2]
    steps:
      - name: Register Deployed Artifact in CloudBees Platform - Production
        uses: cloudbees-io-gha/register-deployed-artifact@v1
        with:
          artifact-id: ${{ needs.build-2.outputs.artifactId2 }}
          target-environment: "production"
          cloudbees-url: "https://api.cloudbees.io"

      - name: Deploy to Production
        run: echo "Deploying second artifact to production..."
